name: DNS Monitor CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest requests pycryptodome matplotlib pandas

    - name: Run Unit Tests with pytest
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest tests/